<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
  <style>
    :root { 
        --hero-purple: #51497f; --hero-gold: #FFD700; 
        --hero-light: #f0efff; --hero-dark: #2c254a; --hero-accent: #00d2ff;
    }
    body { 
        font-family: 'Nunito', sans-serif; background: radial-gradient(circle, #a49fd1 0%, #51497f 100%); 
        margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
        overflow-x: hidden;
    }
    .app-container { width: 100%; max-width: 1400px; padding: 20px; box-sizing: border-box; }
    
    .card-login {
        max-width: 450px; margin: 0 auto; background: white; border-radius: 40px;
        padding: 40px; border: 8px solid var(--hero-purple); box-shadow: 0 15px 0 var(--hero-dark); text-align: center;
    }

    .dashboard-misi {
        background: rgba(255, 255, 255, 0.9); border-radius: 30px; padding: 30px;
        border: 6px solid var(--hero-purple); box-shadow: 0 12px 0 var(--hero-dark);
    }
    .mission-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
    .mission-item {
        background: white; border: 4px solid var(--hero-purple); padding: 20px;
        border-radius: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0 var(--hero-purple); text-align: center;
    }
    .mission-item:hover { transform: translateY(-5px); background: var(--hero-gold); }

    .cinema-box {
        position: relative; width: 100%; height: 120vh; background: #000; 
        border-radius: 25px; border: 6px solid var(--hero-purple); overflow: hidden; margin-top: 15px;
    }
    #frame-web { position: absolute; top: 0; left: 0; width: 100%; height: 120%; border: none; display: none; background: white; }
    #quiz-area {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 85%; max-width: 600px; background: white; padding: 30px;
        border-radius: 30px; border: 8px solid var(--hero-purple); z-index: 1000; box-shadow: 0 0 100px rgba(0,0,0,0.7); display: none;
    }

    .btn-hero {
        padding: 15px 25px; border: none; border-radius: 15px; font-family: 'Bangers', cursive; 
        font-size: 22px; cursor: pointer; background: var(--hero-gold); color: var(--hero-purple);
        border: 3px solid var(--hero-purple); box-shadow: 0 6px 0 var(--hero-purple); transition: 0.1s;
    }
    .btn-hero:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--hero-purple); }
    .input-power {
        width: 100%; padding: 15px; border: 3px solid var(--hero-purple); border-radius: 15px; 
        font-size: 18px; margin-bottom: 15px; text-align: center; box-sizing: border-box;
    }
    
    #selection-ui, #mission-ui, #final-ui { display: none; }
    @media (max-width: 768px) { .cinema-box { height: 75vh; } }
  </style>
</head>
<body onload="initApp()">

<audio id="snd-bg" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>
<audio id="snd-benar"><source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg"></audio>
<audio id="snd-salah"><source src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" type="audio/mpeg"></audio>
<audio id="snd-victory"><source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg"></audio>

<div class="app-container">
  
  <div id="login-ui" class="card-login">
    <div style="font-size: 70px;">🛡️</div>
    <h1 style="font-family:'Bangers'; font-size: 40px; color:var(--hero-purple); margin: 10px 0;">PAHLAWAN GALUH</h1>
    <input type="text" id="nama" class="input-power" placeholder="NAMA AGEN...">
    <input type="number" id="absen" class="input-power" placeholder="NOMOR ABSEN...">
    <select id="kelas-select" class="input-power"></select>
    <button class="btn-hero" style="width:100%" onclick="masuk()">AKTIFKAN MISI! ⚡</button>
  </div>

  <div id="selection-ui" class="dashboard-misi">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--hero-purple); padding-bottom: 15px;">
        <h2 style="margin:0; font-family:'Bangers'; color:var(--hero-purple); font-size: 32px;">PILIH MISIMU, <span id="salam-pahlawan"></span>!</h2>
        <button class="btn-hero" style="background:#ff4757; color:white; font-size: 16px; padding: 8px 20px;" onclick="keluar()">LOGOUT 🚪</button>
    </div>
    <div id="daftar-misi" class="mission-grid"></div>
  </div>

  <div id="mission-ui">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <button class="btn-hero" style="background:#95a5a6; color:white; font-size: 18px;" onclick="kembaliKeDaftar()">⬅️ GANTI MISI</button>
        <h2 id="judul-misi-aktif" style="font-family:'Bangers'; color:white; font-size: 28px; text-shadow: 2px 2px 0 var(--hero-dark); margin:0;"></h2>
        <button class="btn-hero" style="background:#ff4757; color:white; font-size: 18px;" onclick="keluar()">LOGOUT 🚪</button>
    </div>
    <div class="cinema-box">
        <div id="player" style="width:100%; height:100%;"></div>
        <iframe id="frame-web" allow="autoplay; fullscreen"></iframe>
        <div id="quiz-area">
          <p id="teks-soal" style="font-weight:900; font-size:24px; color:var(--hero-purple); margin-top:0;"></p>
          <div id="opsi-container"></div>
          <button class="btn-hero" style="width:100%; margin-top:10px;" onclick="jawab()">KIRIM JAWABAN! 💥</button>
        </div>
    </div>
    <button id="btn-muncul-soal" class="btn-hero" style="display:none; background:#2ecc71; color:white; width:100%; margin-top: 15px;" onclick="bukaSoal()">SAYA SIAP MENJAWAB! 💡</button>
  </div>

  <div id="final-ui">
    <div id="piagam-box" style="background: linear-gradient(135deg, #51497f 0%, #2c254a 100%); border-radius: 40px; padding: 40px; border: 12px solid var(--hero-gold); color: white; text-align: center;">
      <h1 style="font-family:'Bangers'; color:var(--hero-gold); font-size: 50px; margin:0;">PIAGAM PAHLAWAN GALUH</h1>
      <div id="cert-judul" style="font-family:'Bangers'; font-size:30px; color:var(--hero-accent); margin-top:10px;"></div>
      <div id="cert-nama" style="font-family:'Bangers'; font-size:65px; color:white; margin:15px 0;"></div>
      <p style="font-size: 20px; margin:0;">TELAH MENYELESAIKAN MISI DENGAN SKOR:</p>
      <div id="cert-skor" style="font-size:120px; color:var(--hero-gold); font-family:'Bangers'; line-height:1;">0</div>
    </div>
    <div id="list-rank" style="margin-top:40px; width: 100%;"></div>
    <div style="display:flex; gap:15px; justify-content:center; margin-top: 30px;">
      <button class="btn-hero" style="background:#2ecc71; color:white;" onclick="simpanFoto()">💾 SIMPAN PIAGAM</button>
      <button class="btn-hero" onclick="kembaliKeDaftar()">MISI LAIN 🏠</button>
      <button class="btn-hero" style="background:#ff4757; color:white;" onclick="keluar()">LOGOUT 🚪</button>
    </div>
  </div>
</div>

<script>
  let ytPlayer, misiData, misiAktif, idxS=0, skor=0, terpilih="";
  const bgm = document.getElementById('snd-bg');
  const API_URL = 'https://script.google.com/macros/s/AKfycbxC-h4iAIq9yCSddf4XUbuDYRfVlGKC_jLzgHgD_nDiSdNptAKdti9PIs1XdhXLyDKhHQ/exec';

  function callApi(action, payload = {}) {
    return new Promise((resolve, reject) => {
      const callbackName = 'apiCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      const params = new URLSearchParams({
        action,
        payload: JSON.stringify(payload),
        callback: callbackName
      });

      window[callbackName] = (response) => {
        delete window[callbackName];
        script.remove();

        if (response && response.success) resolve(response.data);
        else reject(new Error((response && response.error) || 'API gagal dipanggil.'));
      };

      script.onerror = () => {
        delete window[callbackName];
        script.remove();
        reject(new Error('Tidak dapat menghubungi API. Periksa API_URL dan deployment Apps Script.'));
      };

      script.src = API_URL + '?' + params.toString();
      document.body.appendChild(script);
    });
  }

  async function initApp() {
    const directMissionId = new URLSearchParams(window.location.search).get('missionId');
    if (directMissionId) {
      await bukaMisiLangsung(directMissionId);
      return;
    }

    try {
      const res = await callApi('getDaftarKelas');
      const s = document.getElementById('kelas-select');
      s.innerHTML = '<option value="">-- Pilih Kelas --</option>';
      if(res) res.forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
    } catch (err) {
      alert('Gagal memuat daftar kelas: ' + (err.message || err));
    }
  }

  async function bukaMisiLangsung(missionId) {
    try {
      const res = await callApi('getMissionById', { missionId });
      misiData = [res];
      document.getElementById('login-ui').style.display = 'none';
      gasMisi(0);
    } catch (err) {
      alert('Gagal membuka misi: ' + (err.message || err));
    }
  }

  function masuk() {
    const n = document.getElementById('nama').value, k = document.getElementById('kelas-select').value, a = document.getElementById('absen').value;
    if(!n || !k || !a) return alert("Lengkapi Identitasmu!");
    bgm.volume = 0.1; bgm.play().catch(e => {});
    document.getElementById('salam-pahlawan').innerText = n.toUpperCase();
    document.getElementById('login-ui').style.display = 'none';
    document.getElementById('selection-ui').style.display = 'block';
    muatMisi(k);
  }

  async function muatMisi(kelas) {
    try {
      const res = await callApi('getDaftarVideo', { kelas });
      misiData = res;
      const box = document.getElementById('daftar-misi'); box.innerHTML = "";
      res.forEach((v, i) => {
        box.innerHTML += `<div class="mission-item" onclick="gasMisi(${i})"><div style="font-size:50px;">🌟</div><h3 style="font-family:Bangers; color:var(--hero-purple);">${v.judul}</h3><span>MULAI ></span></div>`;
      });
    } catch (err) {
      alert('Gagal memuat misi: ' + (err.message || err));
    }
  }

function gasMisi(i) {
    // 1. Matikan musik
    bgm.pause(); 
    bgm.currentTime = 0; 

    // 2. Reset semua tampilan
    bersihkanLayarMisi();
    misiAktif = misiData[i]; 
    idxS = 0; 
    skor = 0;

    document.getElementById('selection-ui').style.display = 'none';
    document.getElementById('mission-ui').style.display = 'block';
    document.getElementById('judul-misi-aktif').innerText = misiAktif.judul;
    
    // 3. Cek apakah ini Video YouTube atau Link Web
    const vidId = misiAktif.videoId.toString().trim();
    const isWeb = vidId.includes("http") || vidId.includes("google.com");

    if (!isWeb) {
      // MODE YOUTUBE
      document.getElementById('player').style.display = 'block';
      document.getElementById('frame-web').style.display = 'none';
      mulaiYoutube(vidId);
    } else {
      // MODE WEB (EXEC)
      const frame = document.getElementById('frame-web');
      document.getElementById('player').style.display = 'none';
      frame.style.display = 'block';
      
      // Tips: Jika Google Form, pastikan URL diakhiri /viewform?embedded=true
      frame.src = vidId;

      // Munculkan tombol jawab setelah 1 detik
      setTimeout(() => { 
        document.getElementById('btn-muncul-soal').style.display = 'block'; 
      }, 1500);
    }
  }

  function mulaiYoutube(vId) {
    if(!window.YT) {
      let t = document.createElement('script'); t.src="https://www.youtube.com/iframe_api"; document.head.appendChild(t);
      window.onYouTubeIframeAPIReady = () => createPlayer(vId);
    } else { createPlayer(vId); }
  }

  function createPlayer(vId) {
    if(ytPlayer) try { ytPlayer.destroy(); } catch(e){}
    ytPlayer = new YT.Player('player', {
      videoId: vId, width: '100%', height: '100%',
      events: {
        'onStateChange': (e) => {
          if(e.data == YT.PlayerState.PLAYING) {
            let t = setInterval(() => {
              if(!ytPlayer || typeof ytPlayer.getPlayerState !== 'function' || ytPlayer.getPlayerState() != 1) { clearInterval(t); return; }
              if(misiAktif && idxS < misiAktif.stops.length && ytPlayer.getCurrentTime() >= misiAktif.stops[idxS]) {
                ytPlayer.pauseVideo(); bukaSoal(); clearInterval(t);
              }
            }, 500);
          }
          if(e.data == YT.PlayerState.ENDED) misiSelesai();
        }
      }
    });
  }

  function bukaSoal() {
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('btn-muncul-soal').style.display = 'none';
    document.getElementById('teks-soal').innerText = misiAktif.pertanyaan[idxS];
    const ops = misiAktif.opsi[idxS] || [];
    const oBox = document.getElementById('opsi-container');
    oBox.innerHTML = ""; terpilih = "";
    if (ops.some(o => o && o.trim() !== "")) {
      ops.forEach(o => {
        if(o && o.trim() != "") {
          let b = document.createElement('div'); b.style = "background:#f8f9fa; border:3px solid var(--hero-purple); padding:12px; border-radius:15px; cursor:pointer; font-weight:900; margin-bottom:8px;";
          b.innerText = o.trim();
          b.onclick = () => { Array.from(oBox.children).forEach(x => x.style.background='#f8f9fa'); b.style.background = 'var(--hero-gold)'; terpilih = o.trim(); };
          oBox.appendChild(b);
        }
      });
    } else {
      oBox.innerHTML = `<input type="text" id="input-isian" class="input-power" placeholder="Ketik jawabanmu...">`;
    }
  }

  async function jawab() {
    let jawabanFinal = document.getElementById('input-isian') ? document.getElementById('input-isian').value.trim() : terpilih;
    if(!jawabanFinal) return alert("Jawab dulu!");
    if(jawabanFinal.toLowerCase() === (misiAktif.kunci[idxS]||"").toString().toLowerCase().trim()) {
      skor += 20; document.getElementById('snd-benar').play();
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    } else { document.getElementById('snd-salah').play(); }
    
    try {
      await callApi('simpanJawaban', { nama: document.getElementById('nama').value, idUser: document.getElementById('absen').value, judulVideo: misiAktif.judul, skor: skor, jawabanAsli: jawabanFinal });
    } catch (err) {
      console.error('Gagal menyimpan jawaban:', err);
    }
    document.getElementById('quiz-area').style.display = 'none';
    idxS++;
    if (idxS < misiAktif.pertanyaan.length) {
      if(misiAktif.videoId.includes("http")) document.getElementById('btn-muncul-soal').style.display = 'block';
      else ytPlayer.playVideo();
    } else { misiSelesai(); }
  }

async function misiSelesai() {
    bgm.play(); 
    document.getElementById('mission-ui').style.display = 'none';
    document.getElementById('final-ui').style.display = 'block'; 
    document.getElementById('snd-victory').play();

    const idUser = document.getElementById('absen').value;
    
    document.getElementById('cert-nama').innerText = document.getElementById('nama').value.toUpperCase();
    document.getElementById('cert-skor').innerText = skor;
    document.getElementById('cert-judul').innerText = misiAktif.judul.toUpperCase();

    // Tampilkan loading selagi mengambil peringkat
    document.getElementById('list-rank').innerHTML = "<p style='color:white; text-align:center;'>MENGHITUNG PERINGKAT AGEN...</p>";

    try {
      const res = await callApi('getLeaderboard', { judulVideo: misiAktif.judul, idUser });
      let htmlPeringkat = `
        <div style="background:#00d2ff; color:#2c254a; padding:15px; border-radius:15px; margin-bottom:20px; font-family:'Bangers'; border:4px solid white;">
           MISI: ${res.judul}<br>
           <span style="font-size:28px;">POSISI KAMU: # ${res.myRank} dari ${res.total} AGEN</span>
        </div>
        
        <h3 style='font-family:Bangers; color:var(--hero-gold);'>🏆 10 BESAR AGEN MISI INI</h3>
        <table width='100%' style='background:white; border-radius:15px; color:#333; border-collapse:collapse; overflow:hidden;'>
          <tr style='background:#51497f; color:white; font-weight:bold;'>
            <td style='padding:10px;'>RANK</td>
            <td style='padding:10px;'>NAMA AGEN</td>
            <td style='padding:10px;' align="right">SKOR</td>
          </tr>
      `;

      res.top10.forEach(r => {
        let isMe = (r.absen === idUser.toString());
        htmlPeringkat += `
          <tr style='border-bottom:1px solid #eee; ${isMe ? "background:#fff9c4; font-weight:bold;" : ""}'>
            <td style='padding:10px;'>#${r.rank}</td>
            <td style='padding:10px;'>${isMe ? "⭐ " : ""}${r.nama}</td>
            <td align="right" style='padding:10px;'>${r.skor}</td>
          </tr>`;
      });
      htmlPeringkat += "</table>";

      document.getElementById('list-rank').innerHTML = htmlPeringkat;
    } catch (err) {
      document.getElementById('list-rank').innerHTML = `<p style='color:white; text-align:center;'>Gagal memuat peringkat: ${err.message || err}</p>`;
    }
}

  function bersihkanLayarMisi() {
    if(ytPlayer && typeof ytPlayer.stopVideo === 'function') { try { ytPlayer.stopVideo(); } catch(e){} }
    document.getElementById('player').innerHTML = "";
    document.getElementById('player').style.display = 'none';
    document.getElementById('frame-web').src = "";
    document.getElementById('frame-web').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('btn-muncul-soal').style.display = 'none';
  }

// --- SAAT KEMBALI KE MENU ---
  function kembaliKeDaftar() {
    bersihkanLayarMisi();
    document.getElementById('mission-ui').style.display = 'none';
    document.getElementById('final-ui').style.display = 'none';
    document.getElementById('selection-ui').style.display = 'block';
    
    // Putar kembali musik background saat di menu pilihan
    bgm.play().catch(e => console.log("Menunggu interaksi user"));
  }

function keluar() {
    bersihkanLayarMisi();
    bgm.pause(); 
    bgm.currentTime = 0;
    document.getElementById('nama').value = "";
    document.getElementById('absen').value = "";
    document.getElementById('selection-ui').style.display = 'none';
    document.getElementById('mission-ui').style.display = 'none';
    document.getElementById('final-ui').style.display = 'none';
    document.getElementById('login-ui').style.display = 'block';
  }

  function simpanFoto() { 
    html2canvas(document.getElementById('piagam-box')).then(c => { 
        let a = document.createElement('a'); a.download="Piagam_" + document.getElementById('nama').value + ".png"; 
        a.href=c.toDataURL(); a.click(); 
    }); 
  }
</script>
</body>
</html>
