<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
  <style>
    :root { 
        --hero-purple: #51497f; --hero-gold: #FFD700; 
        --hero-light: #f0efff; --hero-dark: #2c254a; --hero-accent: #00d2ff;
    }
    body { 
        font-family: 'Nunito', sans-serif; background: radial-gradient(circle, #a49fd1 0%, #51497f 100%); 
        margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
        overflow-x: hidden;
    }
    .app-container { width: 100%; max-width: 1400px; padding: 20px; box-sizing: border-box; }
    
    .card-login {
        max-width: 450px; margin: 0 auto; background: white; border-radius: 40px;
        padding: 40px; border: 8px solid var(--hero-purple); box-shadow: 0 15px 0 var(--hero-dark); text-align: center;
    }

    .dashboard-misi {
        padding: 30px 0;
    }
    .mission-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; margin-top: 20px; }
    .mission-item {
        background: white; border: 4px solid var(--hero-purple); padding: 20px;
        border-radius: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0 var(--hero-purple); text-align: center;
    }
    .mission-item:hover { transform: translateY(-5px); background: var(--hero-gold); }

    .mission-filter-panel {
        display: none;
        gap: 12px;
        grid-template-columns: repeat(4, minmax(150px, 1fr));
        margin: 18px auto 0;
        max-width: 1100px;
        width: 100%;
    }

    .mission-filter-panel select {
        appearance: auto;
        background: white;
        border: 4px solid var(--hero-purple);
        border-radius: 16px;
        box-shadow: 0 5px 0 var(--hero-dark);
        color: var(--hero-purple);
        cursor: pointer;
        font-family: 'Nunito', sans-serif;
        font-size: 17px;
        font-weight: 900;
        padding: 12px 14px;
        width: 100%;
    }

    .mission-entry-summary {
        color: white;
        display: none;
        font-weight: 900;
        margin-top: 14px;
        text-align: center;
        text-shadow: 2px 2px 0 var(--hero-dark);
    }

    .player-drawer-btn {
        align-items: center;
        background: rgba(255, 255, 255, 0.95);
        border: 3px solid var(--hero-purple);
        border-radius: 16px;
        box-shadow: 0 5px 0 var(--hero-purple);
        color: var(--hero-purple);
        cursor: pointer;
        display: none;
        font-family: 'Bangers', cursive;
        font-size: 18px;
        gap: 8px;
        padding: 10px 14px;
        position: fixed;
        right: 16px;
        top: 16px;
        z-index: 9999;
    }

    .player-drawer-btn:hover {
        background: #fff8b8;
        color: var(--hero-purple);
    }

    .mission-pagination {
        align-items: center;
        display: none;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin-top: 18px;
    }

    .mission-pagination button {
        background: white;
        border: 3px solid var(--hero-purple);
        border-radius: 14px;
        box-shadow: 0 5px 0 var(--hero-purple);
        color: var(--hero-purple);
        font-family: 'Bangers', cursive;
        font-size: 18px;
        padding: 10px 14px;
        transition: 0.1s;
    }

    .mission-pagination button:hover:not(:disabled) {
        background: var(--hero-gold);
    }

    .mission-pagination button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
    }

    .mission-pagination .page-indicator {
        color: white;
        font-weight: 900;
        padding: 0 8px;
        text-shadow: 2px 2px 0 var(--hero-dark);
    }

    .mission-loading {
        align-items: center;
        color: white;
        display: flex;
        flex-direction: column;
        gap: 14px;
        grid-column: 1 / -1;
        justify-content: center;
        min-height: 230px;
        padding: 30px;
        text-align: center;
    }

    .mission-loading-spinner {
        animation: missionSpin 1s linear infinite;
        border: 8px solid rgba(255, 255, 255, 0.35);
        border-top-color: var(--hero-gold);
        border-right-color: white;
        border-radius: 50%;
        height: 76px;
        width: 76px;
    }

    .mission-loading-title {
        font-family: 'Bangers', cursive;
        font-size: 34px;
        letter-spacing: 1px;
        margin: 0;
        text-shadow: 3px 3px 0 var(--hero-dark), 0 0 18px rgba(255,215,0,0.45);
    }

    .mission-loading-dots span {
        animation: missionBounce 0.9s ease-in-out infinite;
        background: var(--hero-gold);
        border: 3px solid white;
        border-radius: 50%;
        display: inline-block;
        height: 15px;
        margin: 0 4px;
        width: 15px;
    }

    .mission-loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .mission-loading-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes missionSpin {
        to { transform: rotate(360deg); }
    }

    @keyframes missionBounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
    }

    .mission-preview {
        align-items: center;
        background: #151226;
        border: 4px solid var(--hero-purple);
        border-radius: 18px;
        display: flex;
        height: 150px;
        justify-content: center;
        margin-bottom: 14px;
        overflow: hidden;
        position: relative;
        width: 100%;
    }

    .mission-preview img {
        height: 100%;
        object-fit: cover;
        width: 100%;
    }

    .mission-preview .play-badge {
        align-items: center;
        background: rgba(255, 215, 0, 0.95);
        border: 3px solid var(--hero-purple);
        border-radius: 50%;
        color: var(--hero-purple);
        display: flex;
        font-family: 'Bangers', cursive;
        font-size: 28px;
        height: 58px;
        justify-content: center;
        left: 50%;
        padding-left: 4px;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 58px;
    }

    .web-preview {
        color: white;
        flex-direction: column;
        font-weight: 900;
        gap: 8px;
        padding: 18px;
    }

    .web-preview span:first-child {
        font-size: 42px;
        line-height: 1;
    }

    #mission-ui {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .cinema-box {
        position: relative;
        width: 100%;
        flex: 1;
        min-height: 0;
        height: calc(100vh - 145px);
        max-height: 880px;
        background: #000;
        border-radius: 25px;
        border: 6px solid var(--hero-purple);
        overflow: hidden;
    }
    #player, #frame-web {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
    }
    #frame-web { display: none; background: white; }
    .cinema-box:fullscreen,
    .cinema-box:-webkit-full-screen {
        width: 100vw;
        height: 100vh;
        max-height: none;
        border: 0;
        border-radius: 0;
    }

    #btn-fullscreen-video {
        position: absolute;
        right: 16px;
        bottom: 16px;
        z-index: 900;
        padding: 10px 16px;
        font-size: 16px;
        background: rgba(255, 215, 0, 0.95);
    }

    #quiz-area {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 85%; max-width: 600px; overflow: visible;
        background: white; padding: 30px; box-sizing: border-box;
        border-radius: 30px; border: 8px solid var(--hero-purple); z-index: 1000; box-shadow: 0 0 100px rgba(0,0,0,0.7); display: none;
    }

    #game-toast {
        position: fixed;
        left: 50%;
        top: 28px;
        transform: translate(-50%, -24px);
        z-index: 5000;
        min-width: 240px;
        max-width: calc(100vw - 32px);
        padding: 14px 22px;
        border-radius: 18px;
        border: 4px solid var(--hero-gold);
        background: var(--hero-purple);
        color: #fff;
        font-weight: 900;
        text-align: center;
        box-shadow: 0 8px 0 var(--hero-dark), 0 0 40px rgba(0,0,0,0.35);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #game-toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
    }

    .cinema-box:fullscreen #game-toast,
    .cinema-box:-webkit-full-screen #game-toast {
        position: absolute;
    }

    .btn-hero {
        padding: 15px 25px; border: none; border-radius: 15px; font-family: 'Bangers', cursive; 
        font-size: 22px; cursor: pointer; background: var(--hero-gold); color: var(--hero-purple);
        border: 3px solid var(--hero-purple); box-shadow: 0 6px 0 var(--hero-purple); transition: 0.1s;
    }
    .btn-hero:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--hero-purple); }

    .back-home-btn {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 9999;
        padding: 10px 16px;
        background: rgba(255,255,255,0.95);
        color: var(--hero-purple);
        border: 3px solid var(--hero-purple);
        border-radius: 14px;
        box-shadow: 0 5px 0 var(--hero-purple);
        font-family: 'Bangers', cursive;
        font-size: 18px;
        text-decoration: none;
    }

    .back-home-btn:active {
        transform: translateY(3px);
        box-shadow: 0 2px 0 var(--hero-purple);
    }

    .back-home-btn.is-hidden {
        display: none;
    }
    .input-power {
        width: 100%; padding: 15px; border: 3px solid var(--hero-purple); border-radius: 15px; 
        font-size: 18px; margin-bottom: 15px; text-align: center; box-sizing: border-box;
        background: #fff; color: var(--hero-dark);
    }

    #kelas-select {
        appearance: auto;
        -webkit-appearance: menulist;
        -moz-appearance: menulist;
        cursor: pointer;
    }

    #kelas-select option {
        color: var(--hero-dark);
    }
    
    #login-ui, #mission-ui, #final-ui { display: none; }
    @media (max-width: 768px) {
        .cinema-box {
            height: calc(100vh - 165px);
            max-height: none;
        }

        #quiz-area {
            width: 92%;
            padding: 20px;
        }

        .mission-filter-panel {
            grid-template-columns: 1fr;
        }
        .mission-grid {
            grid-template-columns: 1fr;
        }
    }
  </style>
</head>
<body onload="initApp()">

<a id="backHomeLink" class="back-home-btn" href="index.html">⬅ KEMBALI</a>
<button id="playerDashboardBtn" class="player-drawer-btn" type="button" onclick="openPlayerDashboard()">👤 <span id="playerDashboardName">PEMAIN</span></button>

<audio id="snd-bg" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>
<audio id="snd-benar"><source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg"></audio>
<audio id="snd-salah"><source src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" type="audio/mpeg"></audio>
<audio id="snd-victory"><source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg"></audio>

<div class="app-container">
  
  <div id="login-ui" class="card-login">
    <div style="font-size: 70px;">👤</div>
    <h1 style="font-family:'Bangers'; font-size: 40px; color:var(--hero-purple); margin: 10px 0;">PAHLAWAN GALUH</h1>
    <div id="selected-mission-name" style="font-weight:900; color:var(--hero-purple); margin-bottom:15px;"></div>
    <input type="text" id="nama" class="input-power" placeholder="NAMA AGEN..." readonly>
    <input type="email" id="absen" class="input-power" placeholder="EMAIL PEMAIN..." readonly style="display:none;">
    <input type="text" id="kelas-select" class="input-power" placeholder="KELAS..." readonly style="display:none;">
    <button class="btn-hero" style="width:100%" onclick="masuk()">AKTIFKAN MISI! ⚡</button>
    <button class="btn-hero" style="width:100%; background:#95a5a6; color:white; margin-top:12px;" onclick="kembaliKePilihanMisi()">PILIH MISI LAIN</button>
  </div>

  <div id="selection-ui" class="dashboard-misi">
    <div style="display: flex; justify-content: center; align-items: center; padding-bottom: 10px;">
        <h2 id="missionSelectionTitle" style="display:none; margin:0; font-family:'Bangers'; color:white; font-size: 44px; text-shadow: 3px 3px 0 var(--hero-dark), 0 0 18px rgba(255,215,0,0.45);">PILIH MISIMU!</h2>
    </div>
    <div id="missionFilterPanel" class="mission-filter-panel">
      <select id="kelasFilter" onchange="resetMissionFiltersAndRender()" aria-label="Filter kelas">
        <option value="">Semua Kelas</option>
      </select>
      <select id="kategoriFilter" onchange="resetMissionFiltersAndRender()" aria-label="Filter kategori">
        <option value="">Semua Kategori</option>
      </select>
      <select id="entryLimit" onchange="resetMissionFiltersAndRender()" aria-label="Jumlah entri ditampilkan">
        <option value="9">Tampilkan 9 entri</option>
        <option value="18">Tampilkan 18 entri</option>
        <option value="27">Tampilkan 27 entri</option>
        <option value="24">Tampilkan 24 entri</option>
        <option value="all">Tampilkan semua</option>
      </select>
      <select id="sortFilter" onchange="resetMissionFiltersAndRender()" aria-label="Urutkan misi">
        <option value="newest">Misi terbaru</option>
        <option value="popular">Paling banyak dimainkan</option>
      </select>
    </div>
    <div id="missionEntrySummary" class="mission-entry-summary"></div>
    <div id="daftar-misi" class="mission-grid"></div>
    <div id="missionPagination" class="mission-pagination"></div>
  </div>

  <div id="mission-ui">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <button class="btn-hero" style="background:#95a5a6; color:white; font-size: 18px;" onclick="kembaliKeDaftar()">⬅️ GANTI MISI</button>
        <h2 id="judul-misi-aktif" style="font-family:'Bangers'; color:white; font-size: 28px; text-shadow: 2px 2px 0 var(--hero-dark); margin:0;"></h2>
        <button class="btn-hero" style="background:#ff4757; color:white; font-size: 18px;" onclick="keluar()">LOGOUT 🚪</button>
    </div>
    <div class="cinema-box">
        <div id="player" style="width:100%; height:100%;"></div>
        <iframe id="frame-web" allow="autoplay; fullscreen"></iframe>
        <div id="quiz-area">
          <p id="teks-soal" style="font-weight:900; font-size:24px; color:var(--hero-purple); margin-top:0;"></p>
          <div id="opsi-container"></div>
          <button class="btn-hero" style="width:100%; margin-top:10px;" onclick="jawab()">KIRIM JAWABAN! 💥</button>
        </div>
        <button id="btn-fullscreen-video" class="btn-hero" type="button" onclick="toggleVideoFullscreen()">FULLSCREEN</button>
        <div id="game-toast" role="status" aria-live="polite"></div>
    </div>
    <button id="btn-muncul-soal" class="btn-hero" style="display:none; background:#2ecc71; color:white; width:100%; margin-top: 15px;" onclick="bukaSoal()">SAYA SIAP MENJAWAB! 💡</button>
  </div>

  <div id="final-ui">
    <div id="piagam-box" style="background: linear-gradient(135deg, #51497f 0%, #2c254a 100%); border-radius: 40px; padding: 40px; border: 12px solid var(--hero-gold); color: white; text-align: center;">
      <h1 style="font-family:'Bangers'; color:var(--hero-gold); font-size: 50px; margin:0;">PIAGAM PAHLAWAN GALUH</h1>
      <div id="cert-judul" style="font-family:'Bangers'; font-size:30px; color:var(--hero-accent); margin-top:10px;"></div>
      <div id="cert-nama" style="font-family:'Bangers'; font-size:65px; color:white; margin:15px 0;"></div>
      <p style="font-size: 20px; margin:0;">TELAH MENYELESAIKAN MISI DENGAN SKOR:</p>
      <div id="cert-skor" style="font-size:120px; color:var(--hero-gold); font-family:'Bangers'; line-height:1;">0</div>
    </div>
    <div id="list-rank" style="margin-top:40px; width: 100%;"></div>
    <div style="display:flex; gap:15px; justify-content:center; margin-top: 30px;">
      <button class="btn-hero" style="background:#2ecc71; color:white;" onclick="simpanFoto()">💾 SIMPAN PIAGAM</button>
      <button class="btn-hero" onclick="kembaliKeDaftar()">MISI LAIN 🏠</button>
      <button class="btn-hero" style="background:#ff4757; color:white;" onclick="keluar()">LOGOUT 🚪</button>
    </div>
  </div>
</div>

<script>
  function resolvePageUrl(page) {
    return page + '.html';
  }

  document.getElementById('backHomeLink').href = resolvePageUrl('index');

  let ytPlayer, misiData = [], misiAktif, currentPlayer = null, selectedMissionIndex = -1, idxS=0, skor=0, terpilih="";
  let missionPage = 1;
  const bgm = document.getElementById('snd-bg');
  const API_URL = 'https://script.google.com/macros/s/AKfycbxC-h4iAIq9yCSddf4XUbuDYRfVlGKC_jLzgHgD_nDiSdNptAKdti9PIs1XdhXLyDKhHQ/exec';

  function callApi(action, payload = {}) {
    return new Promise((resolve, reject) => {
      const callbackName = 'apiCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      const params = new URLSearchParams({
        action,
        payload: JSON.stringify(payload),
        callback: callbackName
      });

      window[callbackName] = (response) => {
        delete window[callbackName];
        script.remove();

        if (response && response.success) resolve(response.data);
        else reject(new Error((response && response.error) || 'API gagal dipanggil.'));
      };

      script.onerror = () => {
        delete window[callbackName];
        script.remove();
        reject(new Error('Tidak dapat menghubungi API. Periksa API_URL dan deployment Apps Script.'));
      };

      script.src = API_URL + '?' + params.toString();
      document.body.appendChild(script);
    });
  }

  async function initApp() {
    setBackHomeVisible(true);
    loadCurrentPlayer();
    const directMissionId = new URLSearchParams(window.location.search).get('missionId');
    if (directMissionId) {
      await bukaMisiLangsung(directMissionId);
      return;
    }

    try {
      showMissionLoading();
      const res = await callApi('getSemuaMisi');
      misiData = res || [];
      setupMissionFilters();
      renderDaftarMisi();
    } catch (err) {
      alert('Gagal memuat daftar misi: ' + (err.message || err));
    }
  }

  function showMissionLoading() {
    document.getElementById('missionSelectionTitle').style.display = 'none';
    document.getElementById('missionFilterPanel').style.display = 'none';
    document.getElementById('missionEntrySummary').style.display = 'none';
    document.getElementById('missionPagination').style.display = 'none';
    document.getElementById('daftar-misi').innerHTML = `
      <div class="mission-loading" role="status" aria-live="polite">
        <div class="mission-loading-spinner"></div>
        <h3 class="mission-loading-title">MEMUAT DAFTAR MISI</h3>
        <div class="mission-loading-dots"><span></span><span></span><span></span></div>
      </div>
    `;
  }

  async function bukaMisiLangsung(missionId) {
    try {
      const res = await callApi('getMissionById', { missionId });
      misiData = [res];
      if (!currentPlayer || !currentPlayer.email) {
        redirectToPlayerLogin(res);
        return;
      }

      setBackHomeVisible(false);
      document.getElementById('selection-ui').style.display = 'none';
      document.getElementById('login-ui').style.display = 'none';
      gasMisi(0);
    } catch (err) {
      alert('Gagal membuka misi: ' + (err.message || err));
    }
  }

  function masuk() {
    const n = document.getElementById('nama').value, a = document.getElementById('absen').value;
    if(selectedMissionIndex < 0) return alert("Pilih misi dulu!");
    if(!currentPlayer || !currentPlayer.email) return redirectToPlayerLogin(misiData[selectedMissionIndex]);
    if(!n || !a) return alert("Lengkapi Identitasmu!");
    bgm.volume = 0.1; bgm.play().catch(e => {});
    document.getElementById('login-ui').style.display = 'none';
    gasMisi(selectedMissionIndex);
  }

  function renderDaftarMisi() {
    const box = document.getElementById('daftar-misi');
    const summary = document.getElementById('missionEntrySummary');
    const pagination = document.getElementById('missionPagination');
    document.getElementById('missionSelectionTitle').style.display = 'block';
    document.getElementById('missionFilterPanel').style.display = 'grid';
    summary.style.display = 'block';
    pagination.style.display = 'none';
    if (!misiData.length) {
      summary.innerText = 'Menampilkan 0 entri';
      box.innerHTML = '<p style="font-weight:900; color:var(--hero-purple); text-align:center; grid-column:1/-1;">Belum ada misi yang tersedia.</p>';
      return;
    }

    const selectedKelas = document.getElementById('kelasFilter').value;
    const selectedKategori = document.getElementById('kategoriFilter').value;
    const entryLimit = document.getElementById('entryLimit').value;
    const sortMode = document.getElementById('sortFilter').value;
    const filteredMissions = misiData.filter(mission => {
      const kelasMatch = !selectedKelas || String(mission.kelas || '') === selectedKelas;
      const kategoriMatch = !selectedKategori || String(mission.kategori || '') === selectedKategori;
      return kelasMatch && kategoriMatch;
    }).sort((a, b) => {
      if (sortMode === 'popular') {
        const playDiff = (Number(b.jumlahDimainkan) || 0) - (Number(a.jumlahDimainkan) || 0);
        if (playDiff !== 0) return playDiff;
      }

      return String(b.dibuatPada || '').localeCompare(String(a.dibuatPada || ''));
    });

    if (!filteredMissions.length) {
      summary.innerText = 'Menampilkan 0 dari 0 entri';
      box.innerHTML = '<p style="font-weight:900; color:white; text-align:center; grid-column:1/-1; text-shadow:2px 2px 0 var(--hero-dark);">Tidak ada misi untuk filter ini.</p>';
      return;
    }

    const entriesPerPage = entryLimit === 'all' ? filteredMissions.length : Number(entryLimit) || 9;
    const totalPages = entryLimit === 'all' ? 1 : Math.max(1, Math.ceil(filteredMissions.length / entriesPerPage));
    if (missionPage > totalPages) missionPage = totalPages;
    if (missionPage < 1) missionPage = 1;

    const startIndex = (missionPage - 1) * entriesPerPage;
    const visibleMissions = filteredMissions.slice(startIndex, startIndex + entriesPerPage);
    const startLabel = startIndex + 1;
    const endLabel = Math.min(startIndex + visibleMissions.length, filteredMissions.length);
    summary.innerText = `Menampilkan ${startLabel}-${endLabel} dari ${filteredMissions.length} entri | Halaman ${missionPage} dari ${totalPages}`;

    box.innerHTML = "";
    visibleMissions.forEach((v) => {
      const originalIndex = misiData.indexOf(v);
      box.innerHTML += `<div class="mission-item">${renderMissionPreview(v)}<h3 style="font-family:Bangers; color:var(--hero-purple); font-size:32px; line-height:1.05; margin:10px 0 8px;">${escapeHtml(String(v.judul || 'Misi'))}</h3><p style="font-weight:900; margin:8px 0;">Kelas ${escapeHtml(String(v.kelas || '-'))} - ${escapeHtml(String(v.kategori || '-'))}</p><p style="font-weight:900; margin:0 0 4px; color:var(--hero-purple);">Kreator: ${escapeHtml(String(v.namaKreator || '-'))}</p><p style="font-weight:900; margin:0 0 6px; color:var(--hero-purple);">${escapeHtml(String(v.namaSekolahKreator || '-'))} - ${escapeHtml(String(v.kecamatanKreator || '-'))}</p><p style="font-weight:900; margin:0 0 12px; color:#6f687c;">Dimainkan: ${escapeHtml(String(v.jumlahDimainkan || 0))} kali</p><button class="btn-hero" type="button" onclick="mulaiPilihMisi(${originalIndex})">MAIN</button></div>`;
    });

    renderMissionPagination(totalPages);
  }

  function renderMissionPagination(totalPages) {
    const pagination = document.getElementById('missionPagination');
    if (totalPages <= 1) {
      pagination.innerHTML = '';
      pagination.style.display = 'none';
      return;
    }

    const currentPage = missionPage;
    const pageButtons = [];
    if (totalPages <= 5) {
      for (let i = 1; i <= totalPages; i++) {
        pageButtons.push(`<button type="button" ${i === currentPage ? 'disabled' : ''} onclick="goToMissionPage(${i})">${i}</button>`);
      }
    } else {
      const pages = new Set([1, totalPages, currentPage - 1, currentPage, currentPage + 1]);
      [...pages].filter(page => page >= 1 && page <= totalPages).sort((a, b) => a - b).forEach((page, index, arr) => {
        if (index > 0 && page - arr[index - 1] > 1) pageButtons.push('<span class="page-indicator">...</span>');
        pageButtons.push(`<button type="button" ${page === currentPage ? 'disabled' : ''} onclick="goToMissionPage(${page})">${page}</button>`);
      });
    }

    pagination.innerHTML = `
      <button type="button" ${currentPage <= 1 ? 'disabled' : ''} onclick="goToMissionPage(${currentPage - 1})">Sebelumnya</button>
      ${pageButtons.join('')}
      <button type="button" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goToMissionPage(${currentPage + 1})">Selanjutnya</button>
    `;
    pagination.style.display = 'flex';
  }

  function goToMissionPage(page) {
    missionPage = Math.max(1, page);
    renderDaftarMisi();
  }

  function resetMissionFiltersAndRender() {
    missionPage = 1;
    renderDaftarMisi();
  }

  function setupMissionFilters() {
    const kelasFilter = document.getElementById('kelasFilter');
    const kategoriFilter = document.getElementById('kategoriFilter');
    const selectedKelas = kelasFilter.value;
    const selectedKategori = kategoriFilter.value;
    const kelasOptions = [...new Set(misiData.map(mission => String(mission.kelas || '').trim()).filter(Boolean))].sort((a, b) => Number(a) - Number(b));
    const kategoriOptions = [...new Set(misiData.map(mission => String(mission.kategori || '').trim()).filter(Boolean))].sort();

    kelasFilter.innerHTML = '<option value="">Semua Kelas</option>' + kelasOptions.map(kelas => `<option value="${escapeHtml(kelas)}">Kelas ${escapeHtml(kelas)}</option>`).join('');
    kategoriFilter.innerHTML = '<option value="">Semua Kategori</option>' + kategoriOptions.map(kategori => `<option value="${escapeHtml(kategori)}">${escapeHtml(kategori)}</option>`).join('');
    kelasFilter.value = kelasOptions.includes(selectedKelas) ? selectedKelas : '';
    kategoriFilter.value = kategoriOptions.includes(selectedKategori) ? selectedKategori : '';
  }

  function mulaiPilihMisi(index) {
    const mission = misiData[index] || {};
    if (!currentPlayer || !currentPlayer.email) {
      redirectToPlayerLogin(mission);
      return;
    }

    pilihMisi(index);
  }

  function redirectToPlayerLogin(mission) {
    const missionId = mission && mission.missionId ? '?missionId=' + encodeURIComponent(mission.missionId) : '';
    window.location.href = 'login-pemain.html' + missionId;
  }

  function loadCurrentPlayer() {
    try {
      currentPlayer = JSON.parse(localStorage.getItem('weruhPlayer') || 'null');
    } catch (err) {
      currentPlayer = null;
    }

    updatePlayerDashboardButton();
  }

  function updatePlayerDashboardButton() {
    const btn = document.getElementById('playerDashboardBtn');
    const name = document.getElementById('playerDashboardName');
    if (!btn || !name) return;

    const selectionVisible = document.getElementById('selection-ui').style.display !== 'none';
    if (currentPlayer && currentPlayer.email && selectionVisible) {
      name.innerText = currentPlayer.namaLengkap || currentPlayer.email;
      btn.style.display = 'flex';
    } else {
      btn.style.display = 'none';
    }
  }

  function openPlayerDashboard() {
    window.location.href = resolvePageUrl('dashboard-pemain');
  }

  function renderMissionPreview(mission) {
    const youtubeId = getYoutubeId(mission.videoId || '');
    if (youtubeId) {
      return `<div class="mission-preview"><img src="https://img.youtube.com/vi/${encodeURIComponent(youtubeId)}/hqdefault.jpg" alt="Preview ${escapeHtml(String(mission.judul || 'misi'))}"><span class="play-badge">▶</span></div>`;
    }

    return `<div class="mission-preview web-preview"><span>🌐</span><span>Preview Konten Web</span></div>`;
  }

  function getYoutubeId(value) {
    const source = String(value || '').trim();
    if (!source) return '';
    if (/^[a-zA-Z0-9_-]{11}$/.test(source)) return source;

    const patterns = [
      /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
      /youtu\.be\/([a-zA-Z0-9_-]{11})/,
      /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
      /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/
    ];

    for (const pattern of patterns) {
      const match = source.match(pattern);
      if (match) return match[1];
    }

    return '';
  }

  function pilihMisi(index) {
    selectedMissionIndex = index;
    const mission = misiData[index] || {};
    document.getElementById('selected-mission-name').innerText = 'Misi: ' + (mission.judul || '-');
    document.getElementById('nama').value = currentPlayer && currentPlayer.namaLengkap ? currentPlayer.namaLengkap : '';
    document.getElementById('absen').value = currentPlayer && currentPlayer.email ? currentPlayer.email : '';
    document.getElementById('kelas-select').value = mission.kelas || '';
    document.getElementById('selection-ui').style.display = 'none';
    document.getElementById('login-ui').style.display = 'block';
    document.getElementById('playerDashboardBtn').style.display = 'none';
    setBackHomeVisible(false);
  }

  function kembaliKePilihanMisi() {
    document.getElementById('login-ui').style.display = 'none';
    document.getElementById('selection-ui').style.display = 'block';
    updatePlayerDashboardButton();
    selectedMissionIndex = -1;
    document.getElementById('nama').value = '';
    document.getElementById('absen').value = '';
    document.getElementById('kelas-select').value = '';
    setBackHomeVisible(true);
  }

  function setBackHomeVisible(isVisible) {
    document.getElementById('backHomeLink').classList.toggle('is-hidden', !isVisible);
  }

function gasMisi(i) {
    // 1. Matikan musik
    bgm.pause(); 
    bgm.currentTime = 0; 

    // 2. Reset semua tampilan
    bersihkanLayarMisi();
    misiAktif = misiData[i]; 
    idxS = 0; 
    skor = 0;

    document.getElementById('selection-ui').style.display = 'none';
    document.getElementById('mission-ui').style.display = 'block';
    document.getElementById('playerDashboardBtn').style.display = 'none';
    setBackHomeVisible(false);
    document.getElementById('judul-misi-aktif').innerText = misiAktif.judul;
    
    // 3. Cek apakah ini Video YouTube atau Link Web
    const vidId = misiAktif.videoId.toString().trim();
    const isWeb = vidId.includes("http") || vidId.includes("google.com");

    if (!isWeb) {
      // MODE YOUTUBE
      document.getElementById('player').style.display = 'block';
      document.getElementById('frame-web').style.display = 'none';
      mulaiYoutube(vidId);
    } else {
      // MODE WEB (EXEC)
      const frame = document.getElementById('frame-web');
      document.getElementById('player').style.display = 'none';
      frame.style.display = 'block';
      
      // Tips: Jika Google Form, pastikan URL diakhiri /viewform?embedded=true
      frame.src = vidId;

      // Munculkan tombol jawab setelah 1 detik
      setTimeout(() => { 
        document.getElementById('btn-muncul-soal').style.display = 'block'; 
      }, 1500);
    }
  }

  function mulaiYoutube(vId) {
    if(!window.YT) {
      let t = document.createElement('script'); t.src="https://www.youtube.com/iframe_api"; document.head.appendChild(t);
      window.onYouTubeIframeAPIReady = () => createPlayer(vId);
    } else { createPlayer(vId); }
  }

  function createPlayer(vId) {
    if(ytPlayer) try { ytPlayer.destroy(); } catch(e){}
    ytPlayer = new YT.Player('player', {
      videoId: vId, width: '100%', height: '100%',
      playerVars: { fs: 0 },
      events: {
        'onStateChange': (e) => {
          if(e.data == YT.PlayerState.PLAYING) {
            let t = setInterval(() => {
              if(!ytPlayer || typeof ytPlayer.getPlayerState !== 'function' || ytPlayer.getPlayerState() != 1) { clearInterval(t); return; }
              if(misiAktif && idxS < misiAktif.stops.length && ytPlayer.getCurrentTime() >= misiAktif.stops[idxS]) {
                ytPlayer.pauseVideo(); bukaSoal(); clearInterval(t);
              }
            }, 500);
          }
          if(e.data == YT.PlayerState.ENDED) misiSelesai();
        }
      }
    });
  }

  function toggleVideoFullscreen() {
    const box = document.querySelector('.cinema-box');
    const fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;

    if (fullscreenElement) {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      return;
    }

    if (box.requestFullscreen) box.requestFullscreen();
    else if (box.webkitRequestFullscreen) box.webkitRequestFullscreen();
  }

  function keluarFullscreenAman() {
    const fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;
    if (!fullscreenElement) return Promise.resolve();

    if (document.exitFullscreen) return document.exitFullscreen();
    if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
    return Promise.resolve();
  }

  function tampilkanToast(pesan) {
    const toast = document.getElementById('game-toast');
    if (!toast) return;

    clearTimeout(toast.timer);
    toast.innerText = pesan;
    toast.classList.add('show');
    toast.timer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function bukaSoal() {
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('btn-muncul-soal').style.display = 'none';
    document.getElementById('teks-soal').innerText = misiAktif.pertanyaan[idxS];
    const ops = misiAktif.opsi[idxS] || [];
    const oBox = document.getElementById('opsi-container');
    oBox.innerHTML = ""; terpilih = "";
    if (ops.some(o => o && o.trim() !== "")) {
      ops.forEach(o => {
        if(o && o.trim() != "") {
          let b = document.createElement('div'); b.style = "background:#f8f9fa; border:3px solid var(--hero-purple); padding:12px; border-radius:15px; cursor:pointer; font-weight:900; margin-bottom:8px;";
          b.innerText = o.trim();
          b.onclick = () => { Array.from(oBox.children).forEach(x => x.style.background='#f8f9fa'); b.style.background = 'var(--hero-gold)'; terpilih = o.trim(); };
          oBox.appendChild(b);
        }
      });
    } else {
      oBox.innerHTML = `<input type="text" id="input-isian" class="input-power" placeholder="Ketik jawabanmu...">`;
    }
  }

  async function jawab() {
    let jawabanFinal = document.getElementById('input-isian') ? document.getElementById('input-isian').value.trim() : terpilih;
    if(!jawabanFinal) return tampilkanToast("Jawab dulu!");
    if(jawabanFinal.toLowerCase() === (misiAktif.kunci[idxS]||"").toString().toLowerCase().trim()) {
      skor += 20; document.getElementById('snd-benar').play();
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    } else { document.getElementById('snd-salah').play(); }
    
    try {
      await callApi('simpanJawaban', { nama: document.getElementById('nama').value, emailPemain: document.getElementById('absen').value, idUser: document.getElementById('absen').value, judulVideo: misiAktif.judul, skor: skor, jawabanAsli: jawabanFinal });
    } catch (err) {
      console.error('Gagal menyimpan jawaban:', err);
    }
    document.getElementById('quiz-area').style.display = 'none';
    idxS++;
    if (idxS < misiAktif.pertanyaan.length) {
      if(misiAktif.videoId.includes("http")) document.getElementById('btn-muncul-soal').style.display = 'block';
      else ytPlayer.playVideo();
    } else { misiSelesai(); }
  }

async function misiSelesai() {
    await keluarFullscreenAman();
    bgm.play(); 
    document.getElementById('mission-ui').style.display = 'none';
    document.getElementById('final-ui').style.display = 'block'; 
    setBackHomeVisible(true);
    document.getElementById('snd-victory').play();

    const idUser = document.getElementById('absen').value;
    
    document.getElementById('cert-nama').innerText = document.getElementById('nama').value.toUpperCase();
    document.getElementById('cert-skor').innerText = skor;
    document.getElementById('cert-judul').innerText = misiAktif.judul.toUpperCase();

    // Tampilkan loading selagi mengambil peringkat
    document.getElementById('list-rank').innerHTML = "<p style='color:white; text-align:center;'>MENGHITUNG PERINGKAT AGEN...</p>";

    try {
      const res = await callApi('getLeaderboard', { judulVideo: misiAktif.judul, idUser });
      let htmlPeringkat = `
        <div style="background:#00d2ff; color:#2c254a; padding:15px; border-radius:15px; margin-bottom:20px; font-family:'Bangers'; border:4px solid white;">
           MISI: ${res.judul}<br>
           <span style="font-size:28px;">POSISI KAMU: # ${res.myRank} dari ${res.total} AGEN</span>
        </div>
        
        <h3 style='font-family:Bangers; color:var(--hero-gold);'>🏆 10 BESAR AGEN MISI INI</h3>
        <table width='100%' style='background:white; border-radius:15px; color:#333; border-collapse:collapse; overflow:hidden;'>
          <tr style='background:#51497f; color:white; font-weight:bold;'>
            <td style='padding:10px;'>RANK</td>
            <td style='padding:10px;'>NAMA AGEN</td>
            <td style='padding:10px;' align="right">SKOR</td>
          </tr>
      `;

      res.top10.forEach(r => {
        let isMe = (r.absen === idUser.toString());
        htmlPeringkat += `
          <tr style='border-bottom:1px solid #eee; ${isMe ? "background:#fff9c4; font-weight:bold;" : ""}'>
            <td style='padding:10px;'>#${r.rank}</td>
            <td style='padding:10px;'>${isMe ? "⭐ " : ""}${r.nama}</td>
            <td align="right" style='padding:10px;'>${r.skor}</td>
          </tr>`;
      });
      htmlPeringkat += "</table>";

      document.getElementById('list-rank').innerHTML = htmlPeringkat;
    } catch (err) {
      document.getElementById('list-rank').innerHTML = `<p style='color:white; text-align:center;'>Gagal memuat peringkat: ${err.message || err}</p>`;
    }
}

  function bersihkanLayarMisi() {
    if(ytPlayer && typeof ytPlayer.stopVideo === 'function') { try { ytPlayer.stopVideo(); } catch(e){} }
    document.getElementById('player').innerHTML = "";
    document.getElementById('player').style.display = 'none';
    document.getElementById('frame-web').src = "";
    document.getElementById('frame-web').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('btn-muncul-soal').style.display = 'none';
  }

// --- SAAT KEMBALI KE MENU ---
  function kembaliKeDaftar() {
    bersihkanLayarMisi();
    document.getElementById('mission-ui').style.display = 'none';
    document.getElementById('final-ui').style.display = 'none';
    document.getElementById('selection-ui').style.display = 'block';
    document.getElementById('login-ui').style.display = 'none';
    updatePlayerDashboardButton();
    selectedMissionIndex = -1;
    setBackHomeVisible(true);
    
    // Putar kembali musik background saat di menu pilihan
    bgm.play().catch(e => console.log("Menunggu interaksi user"));
  }

function keluar() {
    bersihkanLayarMisi();
    localStorage.removeItem('weruhPlayer');
    currentPlayer = null;
    bgm.pause(); 
    bgm.currentTime = 0;
    document.getElementById('nama').value = "";
    document.getElementById('absen').value = "";
    document.getElementById('kelas-select').value = "";
    document.getElementById('selection-ui').style.display = 'none';
    document.getElementById('mission-ui').style.display = 'none';
    document.getElementById('final-ui').style.display = 'none';
    document.getElementById('login-ui').style.display = 'none';
    document.getElementById('selection-ui').style.display = 'block';
    updatePlayerDashboardButton();
    selectedMissionIndex = -1;
    setBackHomeVisible(true);
  }

  function escapeHtml(value) {
    return value
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function simpanFoto() { 
    html2canvas(document.getElementById('piagam-box')).then(c => { 
        let a = document.createElement('a'); a.download="Piagam_" + document.getElementById('nama').value + ".png"; 
        a.href=c.toDataURL(); a.click(); 
    }); 
  }
</script>
