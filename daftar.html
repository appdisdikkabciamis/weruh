<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_self">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Kreator Misi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --hero-purple: #51497f;
      --hero-gold: #FFD700;
      --hero-dark: #2c254a;
      --hero-light: #f0efff;
    }

    body {
      align-items: center;
      background: radial-gradient(circle, #a49fd1 0%, #51497f 100%);
      color: #2c254a;
      display: flex;
      font-family: "Nunito", sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    .register-card {
      background: white;
      border: 8px solid var(--hero-purple);
      border-radius: 40px;
      box-shadow: 0 15px 0 var(--hero-dark);
      box-sizing: border-box;
      max-width: 520px;
      padding: 40px;
      text-align: center;
      width: 100%;
    }

    .register-icon {
      font-size: 70px;
      line-height: 1;
      margin-bottom: 8px;
    }

    h1 {
      color: var(--hero-purple);
      font-family: "Bangers", cursive;
      font-size: 42px;
      letter-spacing: 1px;
      margin: 10px 0 6px;
    }

    .subtitle {
      color: #655d7d;
      font-weight: 900;
      margin: 0 0 24px;
    }

    .input-power {
      border: 3px solid var(--hero-purple);
      border-radius: 15px;
      box-sizing: border-box;
      font-family: "Nunito", sans-serif;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 15px;
      padding: 15px;
      text-align: center;
      width: 100%;
    }

    .input-power:focus {
      border-color: var(--hero-gold);
      box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.28);
      outline: none;
    }

    .input-power[readonly] {
      background: #f6f4ff;
      color: #4f4a63;
      cursor: not-allowed;
    }

    .lookup-loading {
      align-items: center;
      background: #fff9d8;
      border: 3px solid var(--hero-gold);
      border-radius: 15px;
      color: var(--hero-purple);
      display: none;
      font-weight: 900;
      gap: 10px;
      justify-content: center;
      margin: -4px 0 15px;
      padding: 12px;
    }

    .lookup-loading.is-open {
      display: flex;
    }

    .lookup-spinner {
      animation: spin 0.75s linear infinite;
      border: 4px solid rgba(81, 73, 127, 0.2);
      border-top-color: var(--hero-purple);
      border-radius: 50%;
      height: 22px;
      width: 22px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      margin-top: 4px;
    }

    .btn-hero {
      background: var(--hero-gold);
      border: 3px solid var(--hero-purple);
      border-radius: 15px;
      box-shadow: 0 6px 0 var(--hero-purple);
      color: var(--hero-purple);
      cursor: pointer;
      display: inline-block;
      font-family: "Bangers", cursive;
      font-size: 22px;
      padding: 15px 25px;
      text-align: center;
      text-decoration: none;
      transition: 0.1s;
      width: 100%;
      box-sizing: border-box;
    }

    .btn-hero.secondary {
      background: white;
    }

    .btn-hero:active {
      box-shadow: 0 3px 0 var(--hero-purple);
      transform: translateY(3px);
    }

    .status {
      background: var(--hero-light);
      border: 3px solid var(--hero-purple);
      border-radius: 15px;
      color: var(--hero-purple);
      display: none;
      font-weight: 900;
      margin-top: 18px;
      padding: 12px;
    }

    .status.is-open {
      display: block;
    }

    #registerToast {
      background: var(--hero-purple);
      border: 4px solid var(--hero-gold);
      border-radius: 18px;
      box-shadow: 0 8px 0 var(--hero-dark), 0 0 40px rgba(0,0,0,0.3);
      color: white;
      font-weight: 900;
      left: 50%;
      max-width: calc(100vw - 32px);
      min-width: 240px;
      opacity: 0;
      padding: 14px 22px;
      pointer-events: none;
      position: fixed;
      text-align: center;
      top: 24px;
      transform: translate(-50%, -24px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 5000;
    }

    #registerToast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 600px) {
      body { padding: 20px; }
      .register-card { border-radius: 30px; padding: 28px 22px; }
      h1 { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div id="registerToast" role="status" aria-live="polite"></div>
  <main class="register-card">
    <div class="register-icon">📝</div>
    <h1>DAFTAR KREATOR</h1>
    <p class="subtitle">Lengkapi data kreator untuk mulai membuat misi belajar.</p>

    <form id="creatorForm" onsubmit="submitCreator(event)" novalidate>
      <input id="emailInput" type="email" class="input-power" placeholder="EMAIL BELAJAR.ID...">
      <input id="nameInput" type="text" class="input-power" placeholder="NAMA LENGKAP...">
      <input id="npsnInput" type="text" class="input-power" placeholder="NPSN...">
      <div id="lookupLoading" class="lookup-loading" aria-live="polite">
        <span class="lookup-spinner"></span>
        <span>Mencari nama sekolah dan kecamatan...</span>
      </div>
      <input id="schoolInput" type="text" class="input-power" placeholder="NAMA SEKOLAH..." readonly>
      <input id="districtInput" type="text" class="input-power" placeholder="KECAMATAN..." readonly>
      <div class="btn-row">
        <button id="submitBtn" type="submit" class="btn-hero">SIMPAN PENDAFTARAN!</button>
        <a id="backToLoginLink" class="btn-hero secondary" href="kreator.html">KEMBALI KE LOGIN</a>
      </div>
    </form>

    <div id="statusBox" class="status"></div>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxC-h4iAIq9yCSddf4XUbuDYRfVlGKC_jLzgHgD_nDiSdNptAKdti9PIs1XdhXLyDKhHQ/exec';

    function resolvePageUrl(page) {
      return page + '.html';
    }

    document.getElementById('backToLoginLink').href = resolvePageUrl('kreator');

    function callApi(action, payload = {}) {
      return new Promise((resolve, reject) => {
        const callbackName = 'apiCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const params = new URLSearchParams({
          action,
          payload: JSON.stringify(payload),
          callback: callbackName
        });

        window[callbackName] = (response) => {
          delete window[callbackName];
          script.remove();

          if (response && response.success) resolve(response.data);
          else reject(new Error((response && response.error) || 'API gagal dipanggil.'));
        };

        script.onerror = () => {
          delete window[callbackName];
          script.remove();
          reject(new Error('Tidak dapat menghubungi API. Periksa API_URL dan deployment Apps Script.'));
        };

        script.src = API_URL + '?' + params.toString();
        document.body.appendChild(script);
      });
    }

    function isBelajarEmail(email) {
      return /^[^\s@]+@[a-z0-9.-]+\.belajar\.id$/i.test(email.trim());
    }

    function showStatus(message, type) {
      const box = document.getElementById('statusBox');
      box.className = 'status is-open';
      box.innerText = message;
      box.style.borderColor = type === 'danger' ? '#ff4757' : type === 'warning' ? '#ffc107' : 'var(--hero-purple)';
    }

    function showToast(message) {
      const toast = document.getElementById('registerToast');
      clearTimeout(toast.timer);
      toast.innerText = message;
      toast.classList.add('show');
      toast.timer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function setLookupLoading(isLoading) {
      const loader = document.getElementById('lookupLoading');
      const submitBtn = document.getElementById('submitBtn');
      const npsnInput = document.getElementById('npsnInput');

      loader.className = isLoading ? 'lookup-loading is-open' : 'lookup-loading';
      submitBtn.disabled = isLoading;
      npsnInput.disabled = isLoading;
      submitBtn.innerText = isLoading ? 'MENCARI DATA...' : 'SIMPAN PENDAFTARAN!';
    }

    function clearSchoolLookup() {
      document.getElementById('schoolInput').value = '';
      document.getElementById('districtInput').value = '';
      document.getElementById('statusBox').className = 'status';
    }

    function getPayload() {
      return {
        email: document.getElementById('emailInput').value.trim().toLowerCase(),
        namaLengkap: document.getElementById('nameInput').value.trim(),
        npsn: document.getElementById('npsnInput').value.trim(),
        namaSekolah: document.getElementById('schoolInput').value.trim(),
        kecamatan: document.getElementById('districtInput').value.trim()
      };
    }

    function validatePayload(payload) {
      if (!payload.email || !payload.namaLengkap || !payload.npsn) {
        showStatus('Lengkapi Email, Nama Lengkap, dan NPSN.', 'warning');
        return false;
      }

      if (!isBelajarEmail(payload.email)) {
        showStatus('Email harus memakai domain .belajar.id.', 'warning');
        return false;
      }

      return true;
    }

    async function lookupSchoolByNpsn() {
      const npsnInput = document.getElementById('npsnInput');
      const npsn = npsnInput.value.trim();
      const schoolInput = document.getElementById('schoolInput');
      const districtInput = document.getElementById('districtInput');

      if (!/^[0-9]{8}$/.test(npsn)) {
        clearSchoolLookup();
        return;
      }

      try {
        setLookupLoading(true);
        showStatus('Mencari data sekolah...', 'success');
        const res = await callApi('getSekolahByNpsn', { npsn });
        schoolInput.value = (res && res.namaSekolah) || '';
        districtInput.value = (res && res.kecamatan) || '';
        if (!schoolInput.value || !districtInput.value) {
          showStatus('Data sekolah tidak lengkap untuk NPSN ini.', 'warning');
        } else {
          document.getElementById('statusBox').className = 'status';
        }
      } catch (err) {
        showStatus('Gagal mencari sekolah: ' + (err.message || err), 'danger');
      } finally {
        setLookupLoading(false);
      }
    }

    let npsnLookupTimer = null;
    document.getElementById('npsnInput').addEventListener('input', (event) => {
      const value = event.target.value.replace(/\D/g, '').slice(0, 8);
      if (event.target.value !== value) event.target.value = value;

      clearTimeout(npsnLookupTimer);
      if (value.length < 8) {
        clearSchoolLookup();
        return;
      }

      npsnLookupTimer = setTimeout(() => {
        lookupSchoolByNpsn();
      }, 300);
    });

    async function submitCreator(event) {
      event.preventDefault();
      const payload = getPayload();
      if (!validatePayload(payload)) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = 'MENYIMPAN...';

      try {
        const res = await callApi('registerCreator', payload);
        showStatus((res && res.message) || 'Pendaftaran kreator berhasil disimpan.', 'success');
        document.getElementById('creatorForm').reset();
      } catch (err) {
        if ((err.message || err) === 'EMAIL_ALREADY_REGISTERED') {
          showToast('Email sudah terdaftar');
          showStatus('Email sudah terdaftar.', 'danger');
        } else {
          showStatus('Gagal mendaftar kreator: ' + (err.message || err), 'danger');
        }
      } finally {
        btn.disabled = false;
        btn.innerText = 'SIMPAN PENDAFTARAN!';
      }
    }
  </script>
</body>
</html>
